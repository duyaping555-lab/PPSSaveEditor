name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: List files
      run: ls -la
    
    - name: Check Gradle files
      run: |
        ls -la gradle/wrapper/ || echo "No gradle/wrapper"
        cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "No wrapper properties"
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: ''17''
        distribution: ''temurin''
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: |
        ./gradlew --version
        ./gradlew assembleDebug --stacktrace
    
    - name: Check output
      if: failure()
      run: |
        find . -name "*.apk" 2>/dev/null || echo "No APK found"
        cat app/build/outputs/*/apk/debug/output-metadata.json 2>/dev/null || echo "No metadata"
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: PPSSaveEditor-APK
        path: app/build/outputs/apk/debug/*.apk