name: Build Android APK with Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: List files
      run: |
        ls -la
        ls -la mobile_app/
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ''3.10''
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk
        pip install buildozer cython kivy
    
    - name: Prepare build files
      run: |
        cd mobile_app
        cp ../psp_save_editor.py .
        ls -la
    
    - name: Build APK
      run: |
        cd mobile_app
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 60
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: PPSSaveEditor-APK
        path: mobile_app/bin/*.apk
    
    - name: Upload logs
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: build-logs
        path: mobile_app/build.log