name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: ''17''
        distribution: ''temurin''
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Fix code issues
      run: |
        # Fix HexEditorActivity.kt - rename local variable to avoid conflict
        sed -i ''s/val adapter = android.widget.ArrayAdapter/val typeAdapter = android.widget.ArrayAdapter/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
        sed -i ''s/adapter.setDropDownViewResource/typeAdapter.setDropDownViewResource/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
        sed -i ''s/spinnerType.adapter = adapter/spinnerType.adapter = typeAdapter/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
        
        # Fix SFOParser.kt - fix integer literal overflow
        sed -i ''s/and 0xFFFFFFFC/and 0x7FFFFFFC/g'' app/src/main/java/com/ppssaveeditor/SFOParser.kt
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: PPSSaveEditor-APK
        path: app/build/outputs/apk/debug/*.apk