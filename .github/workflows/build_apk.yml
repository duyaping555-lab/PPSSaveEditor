name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: List all files
      run: find . -type f -name "*.gradle" -o -name "*.xml" -o -name "*.kt" | head -30
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: ''17''
        distribution: ''temurin''
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Check Gradle version
      run: ./gradlew --version
    
    - name: List tasks
      run: ./gradlew tasks --all 2>&1 | head -50
    
    - name: Try build
      run: ./gradlew assembleDebug --stacktrace 2>&1 | tail -100