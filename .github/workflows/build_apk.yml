name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: ''17''
        distribution: ''temurin''
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Check project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo ""
        echo "=== build.gradle ==="
        cat build.gradle
        echo ""
        echo "=== app/build.gradle ==="
        cat app/build.gradle
        echo ""
        echo "=== settings.gradle ==="
        cat settings.gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tail -200
      continue-on-error: true
    
    - name: Check for APK
      run: |
        echo "=== Looking for APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Output directory not found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: PPSSaveEditor-APK
        path: app/build/outputs/apk/debug/*.apk