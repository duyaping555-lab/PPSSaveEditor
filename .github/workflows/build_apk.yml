name: Build Android APK (Auto Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: ''17''
        distribution: ''temurin''
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Fix code issues automatically
      run: |
        echo "=== Fixing MainActivity.kt DocumentFile issues ==="
        sed -i ''s/import androidx.documentfile.DocumentFile//g'' app/src/main/java/com/ppssaveeditor/MainActivity.kt
        sed -i ''s/DocumentFile.fromTreeUri/androidx.documentfile.DocumentFile.fromTreeUri/g'' app/src/main/java/com/ppssaveeditor/MainActivity.kt
        
        echo "=== Fixing SFOParser.kt integer overflow ==="
        sed -i ''s/and 0xFFFFFFFC/and 0x7FFFFFFC/g'' app/src/main/java/com/ppssaveeditor/SFOParser.kt
        
        echo "=== Fixing HexEditorActivity.kt variable conflict ==="
        sed -i ''s/val adapter = android.widget.ArrayAdapter/val typeAdapter = android.widget.ArrayAdapter/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
        sed -i ''s/adapter.setDropDownViewResource/typeAdapter.setDropDownViewResource/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
        sed -i ''s/spinnerType.adapter = adapter/spinnerType.adapter = typeAdapter/g'' app/src/main/java/com/ppssaveeditor/HexEditorActivity.kt
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: PPSSaveEditor-APK
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload build logs on failure
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: build-logs
        path: app/build/